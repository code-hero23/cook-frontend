  <meta name="description" content="Elite Project Management & Interior Design Portal">
  <script>
    // FORCED Polyfill for Safari/WebView (Fixes 'Illegal constructor' during subclassing)
    (function () {
      console.log('[Polyfill] Force-applying safe constructors...');
      
      var OriginalEvent = window.Event;
      var OriginalCustomEvent = window.CustomEvent;

      var createSafeEvent = function (EventClass, name, params) {
        params = params || { bubbles: false, cancelable: false, detail: undefined };
        var evt = document.createEvent('CustomEvent');
        evt.initCustomEvent(name, params.bubbles, params.cancelable, params.detail);
        return evt;
      };

      window.Event = function (name, params) {
        return createSafeEvent(OriginalEvent, name, params);
      };
      window.Event.prototype = OriginalEvent.prototype;

      window.CustomEvent = function (name, params) {
        return createSafeEvent(OriginalCustomEvent, name, params);
      };
      window.CustomEvent.prototype = OriginalCustomEvent.prototype;

      // Also polyfill Notification if illegal
      try {
        if ('Notification' in window) {
          new Notification('test').close();
        }
      } catch (e) {
        console.warn('[Polyfill] Notification restricted, applying fallback...');
        var OriginalNotification = window.Notification;
        window.Notification = function (title, options) {
          return { close: function() {} }; 
        };
        if (OriginalNotification) {
          window.Notification.prototype = OriginalNotification.prototype;
          window.Notification.permission = OriginalNotification.permission;
          window.Notification.requestPermission = OriginalNotification.requestPermission;
        }
      }
    })();
  </script>
</head>
