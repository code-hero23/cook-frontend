  <script>
    // ADVANCED Inheritable Polyfill for Safari/WebView 
    (function () {
      console.log('[Polyfill] Applying Inheritable Fallbacks...');
      
      var OriginalEvent = window.Event;
      var OriginalCustomEvent = window.CustomEvent;

      function fixConstructor(name, Original) {
        var Polyfill = function (type, params) {
          if (!(this instanceof Polyfill)) return new Polyfill(type, params);
          params = params || { bubbles: false, cancelable: false, detail: undefined };
          var evt = document.createEvent('CustomEvent');
          evt.initCustomEvent(type, params.bubbles, params.cancelable, params.detail);
          Object.setPrototypeOf(evt, Polyfill.prototype);
          return evt;
        };
        if (Original) {
          Polyfill.prototype = Object.create(Original.prototype);
          Polyfill.prototype.constructor = Polyfill;
        }
        window[name] = Polyfill;
      }

      fixConstructor('Event', OriginalEvent);
      fixConstructor('CustomEvent', OriginalCustomEvent);

      // Final safety for Notification
      try {
        if ('Notification' in window) new Notification('test').close();
      } catch (e) {
        console.warn('[Polyfill] Fixing Notification...');
        window.Notification = function() { return { close: function() {} }; };
        window.Notification.requestPermission = function() { return Promise.resolve('denied'); };
        window.Notification.permission = 'denied';
      }
    })();
  </script>
