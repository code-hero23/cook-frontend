  <script>
    // UNIVERSAL ERROR SUPPRESSOR
    (function() {
      var _error = window.onerror;
      window.onerror = function(msg, url, line, col, error) {
        if (msg && msg.indexOf('Illegal constructor') > -1) {
          console.warn('[Suppressor] Blocked Illegal Constructor Crash at ' + url + ':' + line);
          return true; // Stop error from bubbling
        }
        if (_error) return _error.apply(this, arguments);
      };
      // Catch unhandled rejections too
      window.onunhandledrejection = function(event) {
        if (event.reason && event.reason.message && event.reason.message.indexOf('Illegal constructor') > -1) {
          console.warn('[Suppressor] Blocked Async Illegal Constructor');
          event.preventDefault();
        }
      };
    })();
  </script>
</head>

</body>
