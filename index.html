<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bix Projects</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bix Projects">
  <meta name="theme-color" content="#f97316">
  <meta name="description" content="Elite Project Management & Interior Design Portal">
  <script>
    // UNIVERSAL SHADOW EVENT POLYFILL 
    // Fixes 'Illegal constructor' in Safari/WebViews globally
    (function () {
      function createSafeEventClass(originalName) {
        var Original = window[originalName];
        var isCustom = originalName === 'CustomEvent';
        
        function ShadowEvent(type, params) {
          params = params || {};
          var evt;
          try {
            // Try standard creation first
            evt = document.createEvent(originalName);
            if (isCustom) {
              evt.initCustomEvent(type, !!params.bubbles, !!params.cancelable, params.detail);
            } else {
              evt.initEvent(type, !!params.bubbles, !!params.cancelable);
            }
          } catch (e) {
            // Fallback for extreme cases
            evt = { type: type, bubbles: !!params.bubbles, cancelable: !!params.cancelable, detail: params.detail };
          }
          
          // Ensure it can be used with 'instanceof' if possible
          if (Original && Original.prototype) {
            Object.setPrototypeOf(evt, Original.prototype);
          }
          return evt;
        }

        if (Original) {
          ShadowEvent.prototype = Original.prototype;
        }
        return ShadowEvent;
      }

      try {
        var SafeEvent = createSafeEventClass('Event');
        var SafeCustomEvent = createSafeEventClass('CustomEvent');
        Object.defineProperty(window, 'Event', { value: SafeEvent, configurable: true, writable: true });
        Object.defineProperty(window, 'CustomEvent', { value: SafeCustomEvent, configurable: true, writable: true });
        console.log('[Fix] Shadow Events Active');
      } catch (e) { console.error(e); }

      // --- THE CODE SURGEON --- 
      window.onerror = function (msg, url, line, col, error) {
        if (msg.indexOf('Illegal constructor') > -1) {
          console.error('🕵️‍♂️ SURGEON: Investigating crash at', url, line, col);
          
          fetch(url).then(function(r) { return r.text(); }).then(function(text) {
             // Minified files usually have everything on a few lines.
             // We use the 'col' (column) to find the exact character.
             var start = Math.max(0, col - 100);
             var snippet = text.substring(start, col + 100);
             console.log('%c [CSI] CRASH SITE CODE: %c ' + snippet, 'background: #f00; color: #fff', 'color: #f00; font-weight: bold;');
             
             // Check for the most likely culprits in the snippet
             if (snippet.indexOf('new CustomEvent') > -1) console.warn('DETECTED: CustomEvent call');
             if (snippet.indexOf('new Event') > -1) console.warn('DETECTED: Event call');
             if (snippet.indexOf('new MessageChannel') > -1) console.warn('DETECTED: MessageChannel call');
             if (snippet.indexOf('new Notification') > -1) console.warn('DETECTED: Notification call');
          }).catch(function(e) { console.error('Surgeon failed to fetch source:', e); });
        }
      };
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
