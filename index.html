<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Bix Projects</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bix Projects">
  <meta name="theme-color" content="#f97316">
  <meta name="description" content="Elite Project Management & Interior Design Portal">
  <script>
    // [PURGE & PROTECT] Sterilize environment before React loads
    (function() {
      // 1. Force-unregister all old Service Workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for(var i=0; i<regs.length; i++) {
            regs[i].unregister().then(function() { console.log('[Purge] SW Killed'); });
          }
        });
      }

      // 2. Suppress the specific 'Select' event trigger if selection is empty/corrupt
      // This prevents the 'new kf' crash we saw in React's onSelect handler
      window.addEventListener('select', function(e) {
        var sel = window.getSelection && window.getSelection();
        if (!sel || !sel.anchorNode) {
          e.stopImmediatePropagation();
        }
      }, true);

      // 3. Global Error Suppressor
      var _error = window.onerror;
      window.onerror = function(msg, url, line, col, error) {
        if (msg && msg.indexOf('Illegal constructor') > -1) {
          console.warn('[Suppressor] Blocked Illegal Constructor at ' + url + ':' + line);
          return true;
        }
        if (_error) return _error.apply(this, arguments);
      };
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
